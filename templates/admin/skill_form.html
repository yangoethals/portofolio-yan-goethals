{% extends 'admin/base.html' %}
{% load crispy_forms_tags %}

{% block title %}Ajouter une compétence Skill{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5><i class="fas fa-plus"></i> Nouvelle compétence Skill</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-success">Enregistrer</button>
                    <a href="{% url 'core_admin:dashboard' %}" class="btn btn-secondary">Annuler</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
