{% extends 'admin/base.html' %}

{% block title %}Connexion Admin - YAN GOETHALS{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4><i class="fas fa-lock"></i> Accès Gestion</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Email / Nom d'utilisateur</label>
                        <input type="text" name="username" class="form-control" placeholder="yangoethals" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">PIN / Mot de passe</label>
                        <input type="password" name="password" class="form-control" placeholder="302001" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-sign-in-alt"></i> Se connecter
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
