services:
  - type: web
    name: portfolio-yan-goethals
    runtime: image
    plan: free
    autoDeploy: true
    image:
      url: portfolio-yan-goethals
    buildCommand: "docker build -t portfolio-yan-goethals ."
    startCommand: "gunicorn portfolio_project.wsgi:application --bind 0.0.0.0:8000"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4

databases:
  - name: portfolio-db
    plan: free
